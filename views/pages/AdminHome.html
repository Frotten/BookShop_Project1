<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员首页 - 网络书城</title>
    <link rel="stylesheet" href="/static/css/CommonStyle.css">
    <link rel="stylesheet" href="/static/css/AdminHome.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet"/>
</head>
<body>

<header class="navbar">
    <h1><i class="ri-book-open-line"></i> 网络书城</h1>
    <div class="nav-right">
        <div id="auth-area" style="display:none; align-items:center; gap:10px;">
            <span><i class="ri-admin-line"></i> 管理员</span>
            <button onclick="logout()"><i class="ri-logout-box-line"></i> 退出登录</button>
        </div>
        <div id="guest-area" style="display:none;">
            <span>当前不是管理员，请退出后台</span>
        </div>
    </div>
</header>

<div id="admin-panel">
    <!-- 欢迎区域 -->
    <div class="admin-welcome">
        <h2><i class="ri-admin-line"></i> 管理员控制台</h2>
        <p>欢迎回来，在这里您可以管理图书、订单、用户等信息。</p>
    </div>

    <!-- 管理模块网格 -->
    <div class="admin-grid">
        <!-- 图书管理 -->
        <div class="admin-card">
            <div class="admin-card-icon book">
                <i class="ri-book-2-line"></i>
            </div>
            <h3><i class="ri-book-2-line"></i> 图书管理</h3>
            <p>添加、修改、删除书籍信息，维护图书库存。</p>
            <div class="admin-card-actions">
                <button class="admin-btn" onclick="location.href='/page/AddBookPage'">
                    <i class="ri-add-line"></i> 添加书籍
                </button>
                <button class="admin-btn" onclick="location.href='/page/UpdateBookPage'">
                    <i class="ri-edit-line"></i> 管理书籍
                </button>
                <button class="admin-btn" onclick="location.href='/page/DeleteBookPage'">
                    <i class="ri-delete-bin-line"></i> 删除书籍
                </button>
            </div>
        </div>

        <!-- 订单管理 -->
        <div class="admin-card">
            <div class="admin-card-icon order">
                <i class="ri-shopping-bag-line"></i>
            </div>
            <h3><i class="ri-shopping-bag-line"></i> 订单管理</h3>
            <p>处理用户订单，进行发货操作。</p>
            <div class="admin-card-actions">
                <button class="admin-btn ship" onclick="location.href='/page/OrderShipmentPage'">
                    <i class="ri-truck-line"></i> 订单发货
                </button>
            </div>
        </div>

        <!-- 用户管理 -->
        <div class="admin-card">
            <div class="admin-card-icon user">
                <i class="ri-user-settings-line"></i>
            </div>
            <h3><i class="ri-user-settings-line"></i> 用户管理</h3>
            <p>查看用户列表，管理用户权限与状态。</p>
            <div class="admin-card-actions">
                <button class="admin-btn" onclick="location.href='/admin/user/list'">
                    <i class="ri-group-line"></i> 用户列表
                </button>
                <button class="admin-btn" onclick="location.href='/admin/user/manage'">
                    <i class="ri-user-star-line"></i> 用户管理
                </button>
            </div>
        </div>

        <!-- 数据统计 -->
        <div class="admin-card">
            <div class="admin-card-icon stat">
                <i class="ri-bar-chart-line"></i>
            </div>
            <h3><i class="ri-bar-chart-line"></i> 数据统计</h3>
            <p>查看商城运营数据、销售报表。</p>
            <div class="admin-card-actions">
                <button class="admin-btn" onclick="location.href='/admin/status'">
                    <i class="ri-pie-chart-line"></i> 查看统计
                </button>
            </div>
        </div>
    </div>
</div>

<div id="guest-panel" style="display:none; padding:40px; text-align:center;">
    <h2><i class="ri-ghost-line"></i> 当前未登录管理员</h2>
    <p style="margin-top:1rem; color:var(--gray-600);">请退出后台页面</p>
</div>

<script src="/static/js/CommonScript.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", async function () {
        const loggedIn = await checkAuth();
        const authArea = document.getElementById("auth-area");
        const guestArea = document.getElementById("guest-area");
        if (loggedIn) {
            authArea.style.display = "flex";
            guestArea.style.display = "none";
            document.getElementById("admin-panel").style.display = "block";
            document.getElementById("guest-panel").style.display = "none";
        } else {
            authArea.style.display = "none";
            guestArea.style.display = "block";
            document.getElementById("admin-panel").style.display = "none";
            document.getElementById("guest-panel").style.display = "block";
        }
    });
</script>
</body>
</html>
