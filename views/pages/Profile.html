<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>个人中心 - 网络书城</title>
    <link rel="stylesheet" href="/static/css/CommonStyle.css">
</head>
<body>

<header class="navbar">
    <h1>📚 网络书城</h1>
    <div>
        <a href="/HomePage">首页</a>
        <button onclick="logout()">退出</button>
    </div>
</header>

<div class="container">
    <h2>个人中心</h2>

    <div class="profile-card">
        <p><strong>用户名：</strong>{{ .username }}</p>
    </div>

    <div class="profile-card">
        <h3>我的订单</h3>
        {{ if .orders }}
        <ul>
            {{ range .orders }}
            <li>订单号：{{ .ID }} - 金额：￥{{ .Amount }}</li>
            {{ end }}
        </ul>
        {{ else }}
        <p>暂无订单</p>
        {{ end }}
    </div>
</div>

<script src="/static/js/CommonScript.js"></script>
</body>
</html>
