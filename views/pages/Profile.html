<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>个人中心 - 网络书城</title>
    <link rel="stylesheet" href="/static/css/CommonStyle.css">
    <link rel="stylesheet" href="/static/css/ProfileStyle.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet"/>
</head>
<body>
<header class="navbar">
    <h1>
        <a href="/page/HomePage" style="color: inherit; text-decoration: none;">
            <i class="ri-book-open-line"></i> 网络书城
        </a>
    </h1>
    <div class="nav-right">
        <a href="/page/HomePage"><i class="ri-home-line"></i> 首页</a>
        <div id="auth-area" style="display:none; align-items:center; gap:12px;">
            <button onclick="logout()"><i class="ri-logout-box-line"></i> 退出</button>
        </div>
        <div id="guest-area" style="display:flex; align-items:center; gap:12px;">
            <a href="/page/LoginPage" class="btn-link"><i class="ri-login-circle-line"></i> 登录</a>
            <a href="/page/RegisterPage" class="btn-link"><i class="ri-user-add-line"></i> 注册</a>
        </div>
    </div>
</header>
<div class="container">
    <div class="profile-header-card" id="profileInfoCard">
        <div class="profile-avatar">
            <i class="ri-user-3-line"></i>
        </div>
        <div class="profile-info" id="profileInfoArea">
            <div class="info-item"><i class="ri-user-line"></i> <strong>用户名：</strong> <span id="username">--</span></div>
            <div class="info-item"><i class="ri-mail-line"></i> <strong>邮箱：</strong> <span id="email">--</span></div>
            <div class="info-item"><i class="ri-user-smile-line"></i> <strong>性别：</strong> <span id="gender">--</span></div>
        </div>
    </div>
    <div class="tabs-container">
        <button class="tab-btn active" data-tab="comments"><i class="ri-chat-1-line"></i> 我的评论</button>
        <button class="tab-btn" data-tab="ratings"><i class="ri-star-smile-line"></i> 评分过的书</button>
        <button class="tab-btn" data-tab="cart"><i class="ri-shopping-cart-line"></i> 购物车</button>
        <button class="tab-btn" data-tab="orders"><i class="ri-file-list-line"></i> 我的订单</button>
    </div>
    <div id="dynamicPanel" class="content-panel">
        <div class="empty-placeholder">
            <i class="ri-chat-1-line"></i>
            <p>加载中...</p>
        </div>
    </div>
</div>
<script src="/static/js/CommonScript.js"></script>
<script>
    //    我的订单列表
    //    GET /api/user/orders
    //    响应格式：{ code: 1000, data: [ { order_id: string, total_amount: number(单位：分), status: string, created_at: string } ] }
    //    状态枚举：pending(待付款), paid(已付款), shipped(已发货), completed(已完成), cancelled(已取消)
    let currentTab = 'comments';

    function escapeHtml(str) {
        if (!str) return '';
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function formatDate(dateStr) {
        if (!dateStr) return '未知时间';
        try {
            const date = new Date(dateStr);
            return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')} ${String(date.getHours()).padStart(2,'0')}:${String(date.getMinutes()).padStart(2,'0')}`;
        } catch(e) {
            return dateStr;
        }
    }

    function renderStars(score) {
        const fullStars = Math.floor(score);
        const halfStar = (score % 1) >= 0.5;
        let starsHtml = '';
        for(let i=0; i<fullStars; i++) starsHtml += '<i class="ri-star-fill"></i>';
        if(halfStar) starsHtml += '<i class="ri-star-half-fill"></i>';
        const emptyStars = 5 - fullStars - (halfStar ? 1 : 0);
        for(let i=0; i<emptyStars; i++) starsHtml += '<i class="ri-star-line"></i>';
        return `<span class="score-stars">${starsHtml}</span> <span style="font-weight:600;">${(score).toFixed(2)}分</span>`;
    }

    async function loadUserProfile() {
        try {
            const response = await apiFetch('/api/userInfo', { method: 'GET' });
            const result = await response.json();
            if (result.code === 1000 && result.data) {
                document.getElementById('username').innerText = escapeHtml(result.data.username) || '未设置';
                document.getElementById('email').innerText = escapeHtml(result.data.email) || '未设置';
                let genderText = '';
                if (result.data.gender === 1) genderText = '男';
                else if (result.data.gender === 0) genderText = '女';
                else genderText = result.data.gender || '未填写';
                document.getElementById('gender').innerText = genderText;
            } else {
                console.warn('获取用户信息失败', result.msg);
                throw new Error('获取用户信息失败');
            }
        } catch (res) {
            console.error('加载用户信息出错:', res);
            document.getElementById('username').innerText = '加载失败';
            document.getElementById('email').innerText = '加载失败';
            document.getElementById('gender').innerText = '加载失败';
        }
    }

    function setPanelLoading(show = true) {
        const panel = document.getElementById('dynamicPanel');
        if (show) {
            panel.innerHTML = `<div class="empty-placeholder"><i class="ri-loader-4-line ri-spin"></i><p>加载中...</p></div>`;
        }
    }

    // ========== 各个模块内容渲染 ==========
    // 我的评论
    async function loadMyComments() {
        setPanelLoading(true);
        try {
            const res = await apiFetch('/api/userComments', { method: 'GET' });
            const result = await res.json();
            if (result.code === 1000) {
                const comments = result.data || [];
                renderCommentsList(comments);
            } else {
                throw new Error(result.msg || '加载评论失败');
            }
        } catch (res) {
            console.error(res);
            document.getElementById('dynamicPanel').innerHTML = `<div class="empty-placeholder"><i class="ri-error-warning-line"></i><p>加载失败，请稍后重试</p><button onclick="loadMyComments()" style="margin-top:1rem;">重试</button></div>`;
        }
    }

    function renderCommentsList(comments) {
        const panel = document.getElementById('dynamicPanel');
        if (!comments.length) {
            panel.innerHTML = `<div class="empty-placeholder"><i class="ri-chat-1-line"></i><p>暂无评论，去逛逛书籍写下你的评价吧~</p><a href="/page/HomePage"><button style="margin-top:1rem;"><i class="ri-book-shelf-line"></i> 去逛逛</button></a></div>`;
            return;
        }
        let html = `<div style="margin-bottom:0.5rem;"><strong>📝 我的评论 (${comments.length})</strong></div>`;
        comments.forEach(cmt => {
            // 根据 CommentBook 结构，使用正确的字段名
            const commentContent = cmt.comment || '';
            const commentTime = cmt.comment_time || '';
            const bookID = cmt.book_id;

            // 如果是被删除的评论，显示特殊样式
            const isDeleted = cmt.status === 2;
            const contentDisplay = isDeleted ? '<span style="color:#94a3b8;font-style:italic;">[该评论已被删除]</span>' : escapeHtml(commentContent);

            html += `
                <div class="comment-item">
                    <div class="item-header">
                        <span class="book-title" data-book-id="${bookID}" onclick="gotoBookDetail(${bookID})">📖 ${escapeHtml(cmt.book_title || '未知书籍')}</span>
                        <span class="meta-text">${formatDate(commentTime)}</span>
                    </div>
                    <div class="content-text">${contentDisplay}</div>
                    ${!isDeleted && (cmt.like_count > 0 || cmt.reply_count > 0) ? `
                    <div class="comment-stats" style="font-size:0.75rem;color:#64748b;margin-top:0.5rem;">
                        <span style="margin-right:1rem;"><i class="ri-thumb-up-line"></i> ${cmt.like_count || 0}</span>
                        <span><i class="ri-reply-line"></i> ${cmt.reply_count || 0}</span>
                    </div>
                    ` : ''}
                </div>
            `;
        });
        panel.innerHTML = html;
    }

    // 评分过的书
    async function loadMyRatings() {
        setPanelLoading(true);
        try {
            const res = await apiFetch('/api/userRatings', { method: 'GET' });
            const result = await res.json();
            if (result.code === 1000) {
                const ratings = result.data || [];
                renderRatingsList(ratings);
            } else {
                throw new Error(result.msg || '加载评分记录失败');
            }
        } catch (res) {
            console.error(res);
            document.getElementById('dynamicPanel').innerHTML = `<div class="empty-placeholder"><i class="ri-error-warning-line"></i><p>加载失败，请稍后重试</p><button onclick="loadMyRatings()" style="margin-top:1rem;">重试</button></div>`;
        }
    }

    function renderRatingsList(ratings) {
        const panel = document.getElementById('dynamicPanel');
        if (!ratings.length) {
            panel.innerHTML = `<div class="empty-placeholder"><i class="ri-star-smile-line"></i><p>还没有评分过的书籍，去发现好书吧~</p><a href="/page/HomePage"><button style="margin-top:1rem;"><i class="ri-book-shelf-line"></i> 浏览书籍</button></a></div>`;
            return;
        }
        let html = `<div style="margin-bottom:0.5rem;"><strong>⭐ 我评分的书籍 (${ratings.length})</strong></div>`;
        ratings.forEach(r => {
            const scoreNum = r.score;
            html += `
                <div class="rating-item">
                    <div class="item-header">
                        <span class="book-title" data-book-id="${r.book_id}" onclick="gotoBookDetail(${r.book_id})">📘 ${escapeHtml(r.book_title)}</span>
                        <span class="meta-text">${renderStars(scoreNum)}</span>
                    </div>
                </div>
            `;
        });
        panel.innerHTML = html;
    }

    // 购物车 (使用 CommonScript 的统一方法)
    async function loadMyCart() {
        setPanelLoading(true);
        try {
            await loadAndRenderCartSimple('dynamicPanel');
        } catch (error) {
            console.error('加载购物车失败:', error);
        }
    }

    // 我的订单
    async function loadMyOrders() {
        setPanelLoading(true);
        try {
            const res = await apiFetch('/api/user/orders', { method: 'GET' });
            const result = await res.json();
            if (result.code === 1000) {
                const orders = result.data || [];
                renderOrdersList(orders);
            } else {
                throw new Error(result.msg || '获取订单失败');
            }
        } catch (res) {
            console.error(res);
            document.getElementById('dynamicPanel').innerHTML = `<div class="empty-placeholder"><i class="ri-error-warning-line"></i><p>加载失败，请稍后重试</p><button onclick="loadMyOrders()">重试</button></div>`;
        }
    }

    function renderOrdersList(orders) {
        const panel = document.getElementById('dynamicPanel');
        if (!orders.length) {
            panel.innerHTML = `<div class="empty-placeholder"><i class="ri-receipt-line"></i><p>暂无订单，去逛逛心仪的书籍吧~</p><a href="/page/HomePage"><button>去首页</button></a></div>`;
            return;
        }
        let html = `<div style="margin-bottom:1rem;"><strong>📦 历史订单 (${orders.length})</strong></div>`;
        orders.forEach(order => {
            let statusClass = '';
            let statusText = '';
            switch(order.status) {
                case 'pending': statusText = '待付款'; statusClass = ''; break;
                case 'paid': statusText = '已付款'; statusClass = 'paid'; break;
                case 'shipped': statusText = '已发货'; statusClass = 'shipped'; break;
                case 'completed': statusText = '已完成'; statusClass = 'completed'; break;
                case 'cancelled': statusText = '已取消'; statusClass = ''; break;
                default: statusText = order.status;
            }
            const amountYuan = (order.total_amount / 100).toFixed(2);
            html += `
                <div class="order-item">
                    <div class="item-header">
                        <span><strong>订单号：</strong>${escapeHtml(order.order_id)}</span>
                        <span class="order-status ${statusClass}">${statusText}</span>
                    </div>
                    <div class="content-text">
                        金额：<span class="price-amount">￥${amountYuan}</span>
                        <span style="margin-left:1rem;">下单时间：${formatDate(order.created_at)}</span>
                    </div>
                </div>
            `;
        });
        panel.innerHTML = html;
    }

    // 统一根据当前选项卡加载内容
    async function loadCurrentTab() {
        switch(currentTab) {
            case 'comments':
                await loadMyComments();
                break;
            case 'ratings':
                await loadMyRatings();
                break;
            case 'cart':
                await loadMyCart();
                break;
            case 'orders':
                await loadMyOrders();
                break;
            default:
                loadMyComments();
        }
    }

    // 切换选项卡
    function switchTab(tabId) {
        currentTab = tabId;
        // 更新按钮样式
        document.querySelectorAll('.tab-btn').forEach(btn => {
            if (btn.dataset.tab === tabId) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
        loadCurrentTab();
    }

    // 书籍详情跳转
    window.gotoBookDetail = function(bookId) {
        if (bookId) {
            window.location.href = `/page/BooksPage?book_id=${bookId}`;
        }
    };

    // 暴露一些全局函数以便 onclick 调用
    window.gotoBookDetail = gotoBookDetail;
    window.loadMyComments = loadMyComments;
    window.loadMyRatings = loadMyRatings;
    window.loadMyCart = loadMyCart;
    window.loadMyOrders = loadMyOrders;

    // ---------- 页面初始化 ----------
    document.addEventListener("DOMContentLoaded", async function() {
        // 1. 先验证登录状态，未登录则跳转登录页
        const isLogged = await checkAuth();  // CommonScript 中已有
        const authArea = document.getElementById("auth-area");
        const guestArea = document.getElementById("guest-area");
        if (isLogged) {
            authArea.style.display = "flex";
            guestArea.style.display = "none";
            // 加载用户个人信息
            await loadUserProfile();
            // 默认加载第一个选项卡 (我的评论)
            switchTab('comments');
        } else {
            // 未登录或 token 无效，跳转登录页
            authArea.style.display = "none";
            guestArea.style.display = "flex";
            alert("请先登录后访问个人中心");
            window.location.href = "/page/LoginPage";
            return;
        }

        // 绑定选项卡点击事件
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', function(e) {
                const tab = this.dataset.tab;
                if (tab) switchTab(tab);
            });
        });

        // 监听购物车更新事件，自动刷新
        document.addEventListener('cartUpdated', function(e) {
            if (currentTab === 'cart') {
                loadMyCart();
            }
        });
    });

</script>
</body>
</html>
