<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>个人中心 - 网络书城</title>
    <link rel="stylesheet" href="/static/css/CommonStyle.css">
</head>
<body>

<header class="navbar">
    <h1>📚 网络书城</h1>
    <div class="nav-right">
        <a href="/HomePage">首页</a>
        <div id="auth-area" style="display:none; align-items:center; gap:12px;">
            <button onclick="logout()">退出</button>
        </div>
        <div id="guest-area" style="display:flex; align-items:center; gap:12px;">
            <a href="/LoginPage" class="btn-link">登录</a>
            <a href="/RegisterPage" class="btn-link">注册</a>
        </div>
    </div>
</header>

<div class="container">
    <h2>个人中心</h2>

    <div class="profile-card">
        <p><strong>用户名：</strong>{{ .username }}</p>
    </div>

    <div class="profile-card">
        <h3>我的订单</h3>
        {{ if .orders }}
        <ul>
            {{ range .orders }}
            <li>订单号：{{ .ID }} - 金额：￥{{ .Amount }}</li>
            {{ end }}
        </ul>
        {{ else }}
        <p>暂无订单</p>
        {{ end }}
    </div>
</div>

<script src="/static/js/CommonScript.js"></script>
<script>
document.addEventListener("DOMContentLoaded", function() {
    checkAuth().then(function(loggedIn) {
        updateNavbar(loggedIn);
    });
});
</script>
</body>
</html>
