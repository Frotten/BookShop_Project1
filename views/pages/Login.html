<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>登录 - 网络书城</title>
    <link rel="stylesheet" href="/static/css/CommonStyle.css">
</head>
<body class="auth-body">

<div class="auth-card">
    <h2>用户登录</h2>

    <form id="loginForm" action="/api/v1/login" method="post">
        <input type="text" name="username" placeholder="用户名" required>
        <input type="password" name="password" placeholder="密码" required>
        <button type="submit">登录</button>
    </form>

    <p class="switch-link">
        没有账号？<a href="/RegisterPage">去注册</a>
    </p>
</div>

<script src="/static/js/CommonScript.js"></script>
</body>
</html>
