<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>书籍详情 · 网络书城</title>
    <!-- 公共样式 -->
    <link rel="stylesheet" href="/static/css/BookDetail.css"></link>
    <link rel="stylesheet" href="/static/css/CommonStyle.css">
    <!-- 图标库 -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet">
    <!-- 详情页专用样式 -->
</head>
<body>

<!-- ========== 导航栏（标题可点击返回主页） ========== -->
<header class="navbar">
    <h1>
        <a href="/page/HomePage" style="color: inherit; text-decoration: none;">
            <i class="ri-book-open-line"></i> 网络书城
        </a>
    </h1>
    <div class="nav-right">
        <div id="auth-area" style="display:none; align-items:center; gap:12px;">
            <a href="/page/ProfilePage"><i class="ri-user-line"></i> 个人中心</a>
            <button onclick="logout()"><i class="ri-logout-box-line"></i> 退出</button>
        </div>
        <div id="guest-area" style="display:flex; align-items:center; gap:12px;">
            <a href="/page/LoginPage" class="btn-link"><i class="ri-login-circle-line"></i> 登录</a>
            <a href="/page/RegisterPage" class="btn-link"><i class="ri-user-add-line"></i> 注册</a>
        </div>
    </div>
</header>

<!-- ========== 主要内容 ========== -->
<div class="container">
    <div id="book-detail-container">
        <!-- 加载提示，会被动态替换 -->
        <div class="loading" style="text-align:center; padding:3rem;">
            <i class="ri-loader-4-line ri-spin" style="font-size:2.5rem; color:var(--primary);"></i>
            <p>加载书籍信息...</p>
        </div>
    </div>
</div>

<!-- 引入公共脚本 (包含 token 管理、apiFetch、logout 等) -->
<script src="/static/js/CommonScript.js"></script>
<!-- 内联脚本：详情页专属逻辑 -->
<script>
    (function() {
        // ---------- 工具函数 ----------
        function escapeHtml(unsafe) {
            if (!unsafe) return '';
            return String(unsafe)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // 当前书籍ID和详情数据
        let currentBookId = null;
        let currentBook = null;
        // 当前选中的评分 (1-5)
        let selectedRating = 0;

        // ---------- 获取URL参数 ----------
        function getQueryParam(name) {
            const params = new URLSearchParams(window.location.search);
            return params.get(name);
        }

        // ---------- 确保已登录 (若未登录尝试刷新，否则跳转) ----------
        async function ensureLoggedIn() {
            let token = getAccessToken();
            if (!token || isAccessTokenExpired(token)) {
                const refreshed = await refreshAccessToken();
                if (!refreshed) {
                    if (confirm('请先登录后再操作')) {
                        window.location.href = '/page/LoginPage';
                    }
                    return false;
                }
            }
            return true;
        }

        // ---------- 初始化页面 ----------
        document.addEventListener('DOMContentLoaded', async function() {
            // 1. 更新导航栏登录状态
            const loggedIn = await checkAuth();
            const authArea = document.getElementById('auth-area');
            const guestArea = document.getElementById('guest-area');
            if (loggedIn) {
                authArea.style.display = 'flex';
                guestArea.style.display = 'none';
            } else {
                authArea.style.display = 'none';
                guestArea.style.display = 'flex';
            }

            // 2. 获取book_id
            const bookId = getQueryParam('book_id');
            if (!bookId) {
                document.getElementById('book-detail-container').innerHTML = `
                    <div class="no-book">
                        <i class="ri-error-warning-line" style="font-size:3rem; color:#f59e0b;"></i>
                        <p>缺少书籍ID，无法显示详情</p>
                        <a href="/page/HomePage" style="display:inline-block; margin-top:1rem;">返回首页</a>
                    </div>
                `;
                return;
            }
            currentBookId = bookId;
            await fetchBookDetail(bookId);
        });

        // ---------- 获取书籍详情 ----------
        async function fetchBookDetail(bookId) {
            const container = document.getElementById('book-detail-container');
            try {
                // 优先调用专用详情接口 (请根据实际后端调整)
                const res = await apiFetch(`/api/getBookDetail/${bookId}`, { method: 'GET' });
                const result = await res.json();

                if (result.code === 1000 && result.data) {
                    currentBook = result.data;
                    renderBookDetail(result.data);
                } else {
                    // 备用：从图书列表接口获取（兼容旧版）
                    console.warn('专用详情接口失败，尝试从列表获取');
                    const listRes = await apiFetch('/api/getBooksJSON', { method: 'GET' });
                    const listData = await listRes.json();
                    if (listData.code === 1000) {
                        const books = listData.data.data || [];
                        const found = books.find(b => b.book_id == bookId);
                        if (found) {
                            currentBook = found;
                            renderBookDetail(found);
                        } else {
                            throw new Error('未找到该书籍');
                        }
                    } else {
                        throw new Error(listData.msg || '获取书籍失败');
                    }
                }
            } catch (err) {
                console.error(err);
                container.innerHTML = `
                    <div class="no-book">
                        <i class="ri-cloud-off-line" style="font-size:3rem; color:#ef4444;"></i>
                        <p>加载失败：${escapeHtml(err.message)}</p>
                        <a href="/page/HomePage" style="display:inline-block; margin-top:1rem;">返回首页</a>
                    </div>
                `;
            }
        }

        // ---------- 渲染详情页 ----------
        function renderBookDetail(book) {
            const container = document.getElementById('book-detail-container');

            const priceYuan = (book.price / 100).toFixed(2);
            const scoreAvg = (book.score / 100).toFixed(2);

            const coverSrc = book.cover_image
                ? (book.cover_image.startsWith('http') ? book.cover_image : '/static/covers/' + book.cover_image)
                : 'https://placehold.co/300x450/e2e8f0/1f2937?text=No+Cover';

            // 解析tags
            let tags = [];
            if (book.tags) {
                if (Array.isArray(book.tags)) {
                    tags = book.tags;
                } else if (typeof book.tags === 'string') {
                    try { tags = JSON.parse(book.tags); } catch (e) { tags = []; }
                }
            }
            const tagsHtml = tags.map(tag =>
                `<span class="tag"><i class="ri-price-tag-3-line"></i>${escapeHtml(tag)}</span>`
            ).join('');

            // 只读星星（根据平均分）
            const readonlyStars = generateReadonlyStars(scoreAvg);

            // 右侧信息
            const infoHtml = `
                <div class="detail-info">
                    <h2><i class="ri-book-2-line"></i> ${escapeHtml(book.title)}</h2>
                    <div class="meta-grid">
                        <div class="meta-item"><i class="ri-user-pen-line"></i> <strong>作者：</strong>${escapeHtml(book.author)}</div>
                        <div class="meta-item"><i class="ri-building-line"></i> <strong>出版社：</strong>${escapeHtml(book.publisher)}</div>
                        <div class="meta-item"><i class="ri-stack-line"></i> <strong>库存：</strong>${book.stock} 件</div>
                        <div class="meta-item"><i class="ri-bar-chart-grouped-line"></i> <strong>销量：</strong>${book.sales} 件</div>
                        <div class="meta-item"><i class="ri-star-s-line"></i> <strong>评分：</strong>${scoreAvg} / 5.0
                            <span class="stars-readonly">${readonlyStars}</span>
                        </div>
                    </div>
                    ${tagsHtml ? `<div class="tag-list">${tagsHtml}</div>` : ''}
                    <div class="price-large">
                        ￥${priceYuan} <small>￥${priceYuan}</small>
                    </div>
                    <div class="action-buttons">
                        <button class="add-to-cart-detail" data-id="${book.book_id}">
                            <i class="ri-shopping-cart-line"></i> 加入购物车
                        </button>
                    </div>
                </div>
            `;

            // 评分 + 评论分离区域
            const ratingHtml = `
                <div class="rating-section">
                    <div class="rating-title">
                        <i class="ri-star-smile-line" style="color: #fbbf24;"></i> 评分与评论
                    </div>
                    <!-- 星星选择 -->
                    <div class="stars-input" id="star-input-area">
                        <i class="ri-star-line" data-value="5"></i>
                        <i class="ri-star-line" data-value="4"></i>
                        <i class="ri-star-line" data-value="3"></i>
                        <i class="ri-star-line" data-value="2"></i>
                        <i class="ri-star-line" data-value="1"></i>
                    </div>
                    <div class="rating-actions">
                        <button id="submit-score-btn"><i class="ri-star-line"></i> 提交评分</button>
                        <!-- 预留空间，可添加提示 -->
                    </div>

                    <div class="rating-feedback">
                        <textarea id="comment-input" placeholder="写下你的评论…… (选填)"></textarea>
                    </div>
                    <div class="rating-actions">
                        <button id="submit-comment-btn"><i class="ri-send-plane-line"></i> 发表评论</button>
                    </div>
                </div>
            `;

            const fullHtml = `
                <div class="detail-wrapper">
                    <div class="detail-cover">
                        <img src="${escapeHtml(coverSrc)}" alt="${escapeHtml(book.title)}封面" loading="lazy">
                    </div>
                    ${infoHtml}
                </div>
                ${ratingHtml}
            `;

            container.innerHTML = fullHtml;

            // 绑定事件
            bindStarEvents();
            document.querySelector('.add-to-cart-detail')?.addEventListener('click', function(e) {
                const id = this.dataset.id;
                if (id) addToCart(id);
            });
            document.getElementById('submit-score-btn')?.addEventListener('click', submitScore);
            document.getElementById('submit-comment-btn')?.addEventListener('click', submitComment);
        }

        // 生成只读星星 (满分5分)
        function generateReadonlyStars(score) {
            const floatScore = parseFloat(score) || 0;
            const fullStars = Math.floor(floatScore);
            const halfStar = (floatScore - fullStars) >= 0.5 ? 1 : 0;
            const emptyStars = 5 - fullStars - halfStar;

            let html = '';
            for (let i=0; i<fullStars; i++) html += '<i class="ri-star-fill" style="color:#fbbf24;"></i>';
            if (halfStar) html += '<i class="ri-star-half-line" style="color:#fbbf24;"></i>';
            for (let i=0; i<emptyStars; i++) html += '<i class="ri-star-line" style="color:#d1d5db;"></i>';
            return html;
        }

        // 星星点击交互
        function bindStarEvents() {
            const stars = document.querySelectorAll('.stars-input i');
            // 移除原有监听，重新绑定
            stars.forEach(star => {
                star.replaceWith(star.cloneNode(true));
            });
            const freshStars = document.querySelectorAll('.stars-input i');
            freshStars.forEach(star => {
                star.addEventListener('click', function(e) {
                    const value = parseInt(this.dataset.value, 10);
                    selectedRating = value;
                    freshStars.forEach(s => s.classList.remove('selected'));
                    freshStars.forEach(s => {
                        if (parseInt(s.dataset.value, 10) <= value) {
                            s.classList.add('selected');
                        }
                    });
                });
            });
            selectedRating = 0; // 初始无选中
        }

        // ---------- 提交评分（仅星级）----------
        async function submitScore() {
            if (selectedRating < 1 || selectedRating > 5) {
                alert('请先点击星星选择评分 (1-5星)');
                return;
            }
            if (!await ensureLoggedIn()) return;

            try {
                const res = await apiFetch('/api/rateBook', {  // 请根据实际后端接口调整
                    method: 'POST',
                    body: JSON.stringify({
                        book_id: parseInt(currentBookId, 10),
                        user_id: null,
                        score: selectedRating
                    })
                });
                const data = await res.json();
                if (data.code === 1000) {
                    alert('评分提交成功！');
                    // 刷新详情以更新平均分
                    await fetchBookDetail(currentBookId);
                } else if (data.code === 1007 || data.code === 1008) {
                    if (confirm('登录状态已失效，请重新登录')) {
                        window.location.href = '/page/LoginPage';
                    }
                } else {
                    alert(data.msg || '评分失败，请稍后重试');
                }
            } catch (err) {
                console.error(err);
                alert('网络错误，无法提交评分');
            }
        }

        // ---------- 提交评论（仅文本）----------
        async function submitComment() {
            const comment = document.getElementById('comment-input').value.trim();
            if (!comment) {
                alert('评论内容不能为空');
                return;
            }
            if (!await ensureLoggedIn()) return;

            try {
                const res = await apiFetch('/api/rateBook/comment', {  // 请根据实际后端接口调整
                    method: 'POST',
                    body: JSON.stringify({
                        book_id: parseInt(currentBookId, 10),
                        comment: comment
                    })
                });
                const data = await res.json();
                if (data.code === 1000) {
                    alert('评论发表成功！');
                    document.getElementById('comment-input').value = ''; // 清空
                    // 如果有评论列表可刷新，此处略
                } else if (data.code === 1007 || data.code === 1008) {
                    if (confirm('登录状态已失效，请重新登录')) {
                        window.location.href = '/page/LoginPage';
                    }
                } else {
                    alert(data.msg || '评论失败，请稍后重试');
                }
            } catch (err) {
                console.error(err);
                alert('网络错误，无法发表评论');
            }
        }
    })();
</script>
</body>
</html>
