<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>首页 - 网络书城</title>
    <link rel="stylesheet" href="/static/css/CommonStyle.css">
    <link rel="stylesheet" href="/static/css/Home.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet"/>
</head>
<body>

<header class="navbar">
    <h1>
        <a href="/page/HomePage" style="color: inherit; text-decoration: none;">
            <i class="ri-book-open-line"></i> 网络书城
        </a>
    </h1>
    <div class="nav-right">
        <div id="auth-area" style="display:none; align-items:center; gap:12px;">
            <a href="/page/ProfilePage"><i class="ri-user-line"></i> 个人中心</a>
            <button onclick="logout()"><i class="ri-logout-box-line"></i> 退出</button>
        </div>
        <div id="guest-area" style="display:flex; align-items:center; gap:12px;">
            <a href="/page/LoginPage" class="btn-link"><i class="ri-login-circle-line"></i> 登录</a>
            <a href="/page/RegisterPage" class="btn-link"><i class="ri-user-add-line"></i> 注册</a>
        </div>
    </div>
</header>

<div class="home-layout">
    <!-- 左侧图书网格 -->
    <div class="book-grid-section">

        <!-- 秒杀入口横幅 -->
        <a href="/page/SeckillPage" class="seckill-banner">
            <div class="seckill-icon">
                <i class="ri-flashlight-line"></i>
            </div>
            <div class="seckill-text">
                <span class="seckill-title"><i class="ri-timer-flash-line"></i> 限时秒杀</span>
                <span class="seckill-subtitle">超低折扣 · 限量抢购 · 每日更新</span>
            </div>
            <i class="ri-arrow-right-s-line seckill-arrow"></i>
        </a>

        <!-- 图书列表区域标题 + 排序切换 -->
        <div class="section-header">
            <h2><i class="ri-book-shelf-line"></i> 图书列表</h2>
            <div class="section-sort-tabs">
                <button class="sort-tab active" data-sort="score" onclick="switchSort(this)">
                    <i class="ri-star-smile-line"></i> 评分排序
                </button>
                <button class="sort-tab" data-sort="sale" onclick="switchSort(this)">
                    <i class="ri-bar-chart-2-line"></i> 销量排序
                </button>
            </div>
        </div>

        <!-- ===== 搜索栏 ===== -->
        <div class="search-bar-wrapper">
            <div class="search-bar">
                <i class="ri-search-line" style="color:#9ca3af; font-size:1.1rem; flex-shrink:0;"></i>
                <input
                    type="text"
                    id="searchInput"
                    placeholder="搜索书名、作者、出版社..."
                    maxlength="100"
                    autocomplete="off"
                    oninput="onSearchInput()"
                    onkeydown="if(event.key==='Enter') doSearch()"
                >
                <button class="btn-clear-search" id="btnClear" onclick="clearSearch()" title="清除搜索">
                    <i class="ri-close-line"></i>
                </button>
                <button class="btn-search" onclick="doSearch()">
                    <i class="ri-search-line"></i> 搜索
                </button>
            </div>

            <!-- 搜索结果下拉列表 -->
            <div class="search-dropdown" id="searchDropdown">
                <div class="search-dropdown-header" id="dropdownHeader">
                    <i class="ri-search-line"></i>
                    <span id="dropdownHeaderText">搜索中...</span>
                </div>
                <div class="search-dropdown-list" id="dropdownList"></div>
                <div class="dropdown-footer" id="dropdownFooter" style="display:none;">
                    <a href="#" id="viewAllLink">
                        <span>查看全部结果</span>
                        <i class="ri-arrow-right-s-line"></i>
                    </a>
                </div>
            </div>
        </div>

        <!-- 图书网格 -->
        <div class="grid" id="book-grid">
            <!-- 动态插入图书卡片 -->
        </div>

        <!-- ===== 分页组件 ===== -->
        <div class="pagination-wrapper" id="pagination-wrapper" style="display:none;">
            <div class="pagination-info" id="pagination-info"></div>
            <div class="pagination-controls" id="pagination-controls"></div>
            <div class="pagination-jump">
                <span>跳至</span>
                <input
                    type="number"
                    id="jump-input"
                    min="1"
                    placeholder="页码"
                    onkeydown="if(event.key==='Enter') jumpToPage()"
                >
                <button class="btn-jump" onclick="jumpToPage()">GO</button>
            </div>
        </div>
    </div>

    <!-- 右侧排行榜（固定宽度） -->
    <div class="ranking-section">
        <div class="ranking-tabs">
            <button class="tab-btn active" data-type="sales"><i class="ri-bar-chart-2-line"></i> 销量榜</button>
            <button class="tab-btn" data-type="score"><i class="ri-star-smile-line"></i> 评分榜</button>
        </div>
        <div class="ranking-list" id="ranking-list">
            <div class="loading-tip">加载中...</div>
        </div>
    </div>
</div>

<script src="/static/js/CommonScript.js"></script>
<script>
    // ===== 状态变量 =====
    let searchTimer = null;
    let selectedIndex = -1;

    // 分页相关状态
    let currentPage = 1;      // 当前页码
    let totalBooks = 0;       // 总书籍数
    let totalPages = 0;       // 总页数
    const PAGE_SIZE = 8;      // 与后端 PageSize 保持一致

    // 当前排序方式（score | sale）
    // 注意：后端分页接口 /api/getBooksJSON/:page 按评分排序
    // 如有销量排序接口后续可在此扩展
    let currentSort = 'score';

    document.addEventListener("DOMContentLoaded", function() {
        // 1. 检查登录状态
        checkAuth().then(function(loggedIn) {
            const authArea = document.getElementById("auth-area");
            const guestArea = document.getElementById("guest-area");
            if (loggedIn) {
                authArea.style.display = "flex";
                guestArea.style.display = "none";
            } else {
                authArea.style.display = "none";
                guestArea.style.display = "flex";
            }
        });

        // 2. 获取第一页图书
        fetchBooks(1);

        // 3. 初始化排行榜（默认加载销量榜）
        fetchRanking('sales');

        // 4. 绑定排行榜标签切换事件
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const type = this.dataset.type;
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                fetchRanking(type);
            });
        });

        // 5. 排行榜点击跳转详情
        document.getElementById('ranking-list').addEventListener('click', function(e) {
            const item = e.target.closest('.ranking-item');
            if (item && item.dataset.bookId) {
                window.location.href = `/page/BooksPage?book_id=${item.dataset.bookId}`;
            }
        });

        // 6. 点击其他区域关闭下拉列表
        document.addEventListener('click', function(e) {
            const wrapper = document.querySelector('.search-bar-wrapper');
            if (!wrapper.contains(e.target)) {
                hideDropdown();
            }
        });

        // 7. ESC 键关闭下拉列表
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                hideDropdown();
            }
        });
    });

    // ===== 排序切换 =====
    function switchSort(el) {
        document.querySelectorAll('.sort-tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        currentSort = el.dataset.sort;
        fetchBooks(1);
    }

    // ===== 图书列表（分页） =====
    async function fetchBooks(page) {
        const grid = document.getElementById('book-grid');
        grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:3rem 1rem; color:var(--gray-600);">
            <i class="ri-loader-4-line ri-spin" style="font-size:2rem;display:block;margin-bottom:0.5rem;"></i>
            加载中...
        </div>`;

        try {
            const isSaleSort = currentSort === 'sale';
            const baseUrl = isSaleSort ? '/api/getBooksBySaleJSON' : '/api/getBooksJSON';
            const url = page === 1 ? baseUrl : `${baseUrl}/${page}`;

            const res = await apiFetch(url, { method: 'GET' });
            const result = await res.json();

            if (result.code === 1000) {
                const pageData = result.data;
                const books = pageData.data || [];
                totalBooks = pageData.total || 0;
                totalPages = Math.ceil(totalBooks / PAGE_SIZE);
                currentPage = pageData.page || page;

                renderBooks(books);
                renderPagination();
            } else {
                grid.innerHTML = `<div class="no-result" style="grid-column:1/-1;">
                    <i class="ri-error-warning-line"></i><p>获取图书列表失败</p>
                </div>`;
            }
        } catch (e) {
            console.error(e);
            grid.innerHTML = `<div class="no-result" style="grid-column:1/-1;">
                <i class="ri-wifi-off-line"></i><p>网络异常，请稍后重试</p>
            </div>`;
        }
    }

    function renderBooks(books) {
        const grid = document.getElementById('book-grid');
        if (!books || books.length === 0) {
            grid.innerHTML = `
                <div class="no-result" style="grid-column:1/-1;">
                    <i class="ri-book-2-line" style="font-size:3rem; opacity:0.4; display:block; margin-bottom:0.75rem;"></i>
                    <p>暂无书籍</p>
                </div>`;
            return;
        }
        let html = '';
        books.forEach(book => {
            const priceYuan = (book.price / 100).toFixed(2);
            const score = book.score ? (book.score / 100).toFixed(2) : '暂无';
            html += `
            <div class="book-card" data-book-id="${book.book_id}">
                <h3>${escapeHtml(book.title)}</h3>
                <p><i class="ri-pencil-line"></i> 作者：${escapeHtml(book.author)}</p>
                <p class="score"><i class="ri-star-smile-line"></i> 评分：${score}</p>
                <p class="price"><i class="ri-money-cny-circle-line"></i> ￥${priceYuan}</p>
                <button
                    class="add-to-cart-btn"
                    data-id="${book.book_id}"
                    data-title="${escapeHtml(book.title)}"
                    data-price="${book.price}"
                    data-stock="${book.stock || 99}"
                >
                    <i class="ri-shopping-cart-line"></i> 加入购物车
                </button>
            </div>
            `;
        });
        grid.innerHTML = html;

        grid.onclick = function(e) {
            const button = e.target.closest('.add-to-cart-btn');
            if (button) {
                e.stopPropagation();
                showQuantityDialog(button.dataset.id, button.dataset.title, button.dataset.price, parseInt(button.dataset.stock) || 99);
                return;
            }
            const card = e.target.closest('.book-card');
            if (card && card.dataset.bookId) {
                window.location.href = `/page/BooksPage?book_id=${card.dataset.bookId}`;
            }
        };
    }

    // ===== 分页渲染 =====
    function renderPagination() {
        const wrapper = document.getElementById('pagination-wrapper');
        const info = document.getElementById('pagination-info');
        const controls = document.getElementById('pagination-controls');

        if (totalPages <= 1) {
            wrapper.style.display = 'none';
            return;
        }
        wrapper.style.display = 'flex';

        // 分页信息
        const start = (currentPage - 1) * PAGE_SIZE + 1;
        const end = Math.min(currentPage * PAGE_SIZE, totalBooks);
        info.innerHTML = `共 <span>${totalBooks}</span> 本书 · 第 <span>${start}–${end}</span> 本 · 第 <span>${currentPage}</span>/<span>${totalPages}</span> 页`;

        // 更新跳转输入框最大值
        const jumpInput = document.getElementById('jump-input');
        if (jumpInput) jumpInput.max = totalPages;

        // 页码按钮
        controls.innerHTML = buildPageButtons();
    }

    function buildPageButtons() {
        let html = '';

        // 上一页
        html += `<button class="page-btn" onclick="goPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''} title="上一页">
            <i class="ri-arrow-left-s-line"></i>
        </button>`;

        // 页码按钮（最多显示 7 个，超出用省略号）
        const pages = getPageRange(currentPage, totalPages);
        pages.forEach(p => {
            if (p === '...') {
                html += `<span class="page-ellipsis">···</span>`;
            } else {
                html += `<button class="page-btn ${p === currentPage ? 'active' : ''}" onclick="goPage(${p})">${p}</button>`;
            }
        });

        // 下一页
        html += `<button class="page-btn" onclick="goPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''} title="下一页">
            <i class="ri-arrow-right-s-line"></i>
        </button>`;

        return html;
    }

    // 生成页码范围（带省略号）
    function getPageRange(current, total) {
        if (total <= 7) {
            return Array.from({ length: total }, (_, i) => i + 1);
        }
        const pages = [];
        // 始终显示第 1 页
        pages.push(1);
        if (current > 3) pages.push('...');
        // 当前页附近
        const start = Math.max(2, current - 1);
        const end = Math.min(total - 1, current + 1);
        for (let i = start; i <= end; i++) {
            pages.push(i);
        }
        if (current < total - 2) pages.push('...');
        // 始终显示最后一页
        pages.push(total);
        return pages;
    }

    // 跳转到指定页
    function goPage(page) {
        if (page < 1 || page > totalPages || page === currentPage) return;
        // 滚动到图书列表顶部
        document.querySelector('.book-grid-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
        fetchBooks(page);
    }

    // 跳转输入框
    function jumpToPage() {
        const input = document.getElementById('jump-input');
        const page = parseInt(input.value);
        if (!page || page < 1 || page > totalPages) {
            input.focus();
            input.select();
            return;
        }
        input.value = '';
        goPage(page);
    }

    // ===== 搜索逻辑 =====

    // 输入时：显示/隐藏清除按钮，防抖触发搜索
    function onSearchInput() {
        const val = document.getElementById('searchInput').value;
        const btnClear = document.getElementById('btnClear');
        if (val.trim()) {
            btnClear.classList.add('visible');
        } else {
            btnClear.classList.remove('visible');
            hideDropdown();
            return;
        }
        // 防抖 350ms，自动触发搜索
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => {
            doSearch();
        }, 350);
    }

    // 显示下拉列表
    function showDropdown() {
        const dropdown = document.getElementById('searchDropdown');
        dropdown.classList.add('active');
    }

    // 隐藏下拉列表
    function hideDropdown() {
        const dropdown = document.getElementById('searchDropdown');
        dropdown.classList.remove('active');
        selectedIndex = -1;
    }

    // 更新下拉列表头部
    function updateDropdownHeader(keyword, count, isLoading) {
        const headerText = document.getElementById('dropdownHeaderText');
        if (isLoading) {
            headerText.textContent = '搜索中...';
        } else {
            headerText.textContent = `关键词 "${escapeHtml(keyword)}" 找到 ${count} 本书`;
        }
    }

    // 执行搜索
    async function doSearch() {
        const keyword = document.getElementById('searchInput').value.trim();
        if (!keyword) {
            hideDropdown();
            return;
        }

        const list = document.getElementById('dropdownList');

        // 显示加载状态
        showDropdown();
        updateDropdownHeader(keyword, 0, true);
        list.innerHTML = `<div class="dropdown-loading"><i class="ri-loader-4-line ri-spin"></i> 搜索中...</div>`;
        document.getElementById('dropdownFooter').style.display = 'none';

        try {
            const res = await apiFetch(
                `/api/getBookTitle/${encodeURIComponent(keyword)}`,
                { method: 'GET' }
            );
            const result = await res.json();

            if (result.code === 1000) {
                const books = result.data || [];
                renderSearchDropdown(keyword, books);
            } else {
                list.innerHTML = `
                    <div class="dropdown-empty">
                        <i class="ri-error-warning-line"></i>
                        <p>搜索失败，请稍后重试</p>
                    </div>`;
                updateDropdownHeader(keyword, 0, false);
            }
        } catch (e) {
            console.error('搜索请求失败:', e);
            list.innerHTML = `
                <div class="dropdown-empty">
                    <i class="ri-wifi-off-line"></i>
                    <p>网络异常，请检查连接</p>
                </div>`;
            updateDropdownHeader(keyword, 0, false);
        }
    }

    // 渲染搜索结果下拉列表
    function renderSearchDropdown(keyword, books) {
        const list = document.getElementById('dropdownList');
        const footer = document.getElementById('dropdownFooter');
        const viewAllLink = document.getElementById('viewAllLink');

        updateDropdownHeader(keyword, books.length, false);

        if (!books || books.length === 0) {
            list.innerHTML = `
                <div class="dropdown-empty">
                    <i class="ri-search-eye-line"></i>
                    <p>没有找到与 "${escapeHtml(keyword)}" 相关的书籍</p>
                </div>`;
            footer.style.display = 'none';
            return;
        }

        // 最多显示 5 条结果
        const displayBooks = books.slice(0, 5);
        let html = '';
        displayBooks.forEach((book, index) => {
            const priceYuan = (book.price / 100).toFixed(2);
            const score = book.score ? (book.score / 100).toFixed(1) : '暂无';
            const scoreColor = book.score >= 800 ? '#f59e0b' : '#9ca3af';
            html += `
                <a class="dropdown-item" href="/page/BooksPage?book_id=${book.book_id}"
                   data-index="${index}" data-book-id="${book.book_id}">
                    <div class="dropdown-book-icon">
                        <i class="ri-book-2-line"></i>
                    </div>
                    <div class="dropdown-item-info">
                        <div class="dropdown-item-title">${escapeHtml(book.title)}</div>
                        <div class="dropdown-item-meta">${escapeHtml(book.author || '未知作者')}</div>
                    </div>
                    <div class="dropdown-item-score" style="color:${scoreColor};">
                        <i class="ri-star-smile-fill"></i>
                        ${score}
                    </div>
                    <div class="dropdown-item-price">￥${priceYuan}</div>
                </a>`;
        });
        list.innerHTML = html;

        // 如果结果超过 5 条，显示"查看全部"
        if (books.length > 5) {
            footer.style.display = 'block';
            viewAllLink.href = `/page/BooksPage?keyword=${encodeURIComponent(keyword)}`;
        } else {
            footer.style.display = 'none';
        }

        // 键盘导航
        setupKeyboardNavigation(displayBooks);
    }

    // 键盘上下导航
    function setupKeyboardNavigation(books) {
        const input = document.getElementById('searchInput');
        input.addEventListener('keydown', function(e) {
            const items = document.querySelectorAll('.dropdown-item');
            if (items.length === 0) return;

            if (e.key === 'ArrowDown') {
                e.preventDefault();
                selectedIndex = selectedIndex < items.length - 1 ? selectedIndex + 1 : 0;
                items[selectedIndex].focus();
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                selectedIndex = selectedIndex > 0 ? selectedIndex - 1 : items.length - 1;
                items[selectedIndex].focus();
            } else if (e.key === 'Enter' && selectedIndex >= 0) {
                e.preventDefault();
                items[selectedIndex].click();
            }
        });
    }

    // 清除搜索
    function clearSearch() {
        document.getElementById('searchInput').value = '';
        document.getElementById('btnClear').classList.remove('visible');
        hideDropdown();
        document.getElementById('searchInput').focus();
    }

    // ===== 排行榜 =====
    async function fetchSalesRanking() {
        const res = await apiFetch('/api/topSale', { method: 'GET' });
        const result = await res.json();
        if (result.code === 1000) return result.data || [];
        throw new Error(result.msg || '获取销量榜失败');
    }

    async function fetchScoreRanking() {
        const res = await apiFetch('/api/topScore', { method: 'GET' });
        const result = await res.json();
        if (result.code === 1000) return result.data || [];
        throw new Error(result.msg || '获取评分榜失败');
    }

    async function fetchRanking(type) {
        const listEl = document.getElementById('ranking-list');
        listEl.innerHTML = '<div class="loading-tip">加载中...</div>';
        try {
            const data = type === 'sales' ? await fetchSalesRanking() : await fetchScoreRanking();
            renderRanking(data, type);
        } catch (res) {
            console.error(res);
            listEl.innerHTML = `<div class="loading-tip">加载失败，请稍后重试</div>`;
        }
    }

    function renderRanking(items, type) {
        const listEl = document.getElementById('ranking-list');
        if (!items || items.length === 0) {
            listEl.innerHTML = '<div class="loading-tip">暂无数据</div>';
            return;
        }
        let html = '';
        items.slice(0, 10).forEach((item, index) => {
            const rank = index + 1;
            const title = escapeHtml(item.title || '');
            let value = type === 'sales'
                ? `<i class="ri-bar-chart-2-line"></i> ${item.sales || 0} 销量`
                : `<i class="ri-star-smile-line"></i> ${(item.score / 100).toFixed(2)} 分`;
            html += `
                <div class="ranking-item" data-book-id="${item.book_id}">
                    <span class="rank-num">${rank}</span>
                    <span class="rank-info"><span class="rank-title">${title}</span></span>
                    <span class="rank-value">${value}</span>
                </div>
            `;
        });
        listEl.innerHTML = html;
    }

    function escapeHtml(unsafe) {
        if (!unsafe) return '';
        return String(unsafe)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }
</script>
</body>
</html>
