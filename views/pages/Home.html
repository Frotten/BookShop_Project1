<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>首页 - 网络书城</title>
    <link rel="stylesheet" href="/static/css/CommonStyle.css">
    <link rel="stylesheet" href="/static/css/Home.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet"/>
</head>
<body>

<header class="navbar">
    <h1>
        <a href="/page/HomePage" style="color: inherit; text-decoration: none;">
            <i class="ri-book-open-line"></i> 网络书城
        </a>
    </h1>
    <div class="nav-right">
        <div id="auth-area" style="display:none; align-items:center; gap:12px;">
            <a href="/page/ProfilePage"><i class="ri-user-line"></i> 个人中心</a>
            <button onclick="logout()"><i class="ri-logout-box-line"></i> 退出</button>
        </div>
        <div id="guest-area" style="display:flex; align-items:center; gap:12px;">
            <a href="/page/LoginPage" class="btn-link"><i class="ri-login-circle-line"></i> 登录</a>
            <a href="/page/RegisterPage" class="btn-link"><i class="ri-user-add-line"></i> 注册</a>
        </div>
    </div>
</header>

<div class="home-layout">
    <!-- 左侧图书网格 -->
    <div class="book-grid-section">
        <h2 style="margin-bottom:1rem;"><i class="ri-book-shelf-line"></i> 图书列表</h2>

        <!-- ===== 搜索栏 ===== -->
        <div class="search-bar-wrapper">
            <div class="search-bar">
                <i class="ri-search-line" style="color:#9ca3af; font-size:1.1rem; flex-shrink:0;"></i>
                <input
                    type="text"
                    id="searchInput"
                    placeholder="搜索书名、作者、出版社..."
                    maxlength="100"
                    autocomplete="off"
                    oninput="onSearchInput()"
                    onkeydown="if(event.key==='Enter') doSearch()"
                >
                <button class="btn-clear-search" id="btnClear" onclick="clearSearch()" title="清除搜索">
                    <i class="ri-close-line"></i>
                </button>
                <button class="btn-search" onclick="doSearch()">
                    <i class="ri-search-line"></i> 搜索
                </button>
            </div>
            <!-- 搜索结果提示行 -->
            <div class="search-result-tip" id="searchTip" style="display:none;"></div>
        </div>

        <div class="grid" id="book-grid">
            <!-- 动态插入图书卡片 -->
        </div>
    </div>

    <!-- 右侧排行榜（固定宽度） -->
    <div class="ranking-section">
        <div class="ranking-tabs">
            <button class="tab-btn active" data-type="sales"><i class="ri-bar-chart-2-line"></i> 销量榜</button>
            <button class="tab-btn" data-type="score"><i class="ri-star-smile-line"></i> 评分榜</button>
        </div>
        <div class="ranking-list" id="ranking-list">
            <div class="loading-tip">加载中...</div>
        </div>
    </div>
</div>

<script src="/static/js/CommonScript.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", function() {
        // 1. 检查登录状态
        checkAuth().then(function(loggedIn) {
            const authArea = document.getElementById("auth-area");
            const guestArea = document.getElementById("guest-area");
            if (loggedIn) {
                authArea.style.display = "flex";
                guestArea.style.display = "none";
            } else {
                authArea.style.display = "none";
                guestArea.style.display = "flex";
            }
        });

        // 2. 获取图书列表
        fetchBooks();

        // 3. 初始化排行榜（默认加载销量榜）
        fetchRanking('sales');

        // 4. 绑定排行榜标签切换事件
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const type = this.dataset.type;
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                fetchRanking(type);
            });
        });

        // 5. 排行榜点击跳转详情
        document.getElementById('ranking-list').addEventListener('click', function(e) {
            const item = e.target.closest('.ranking-item');
            if (item && item.dataset.bookId) {
                window.location.href = `/page/BooksPage?book_id=${item.dataset.bookId}`;
            }
        });
    });

    // ===== 搜索逻辑 =====

    // 输入时：显示/隐藏清除按钮，防抖触发搜索
    function onSearchInput() {
        const val = document.getElementById('searchInput').value;
        const btnClear = document.getElementById('btnClear');
        if (val.trim()) {
            btnClear.classList.add('visible');
        } else {
            btnClear.classList.remove('visible');
        }
        // 防抖 300ms，自动触发搜索
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => {
            if (val.trim() !== '') {
                doSearch();
            }
        }, 300);
    }

    // 执行搜索
    async function doSearch() {
        const keyword = document.getElementById('searchInput').value.trim();
        if (!keyword) {
            clearSearch();
            return;
        }

        const grid = document.getElementById('book-grid');
        const tip = document.getElementById('searchTip');

        grid.innerHTML = `<div class="search-loading"><i class="ri-loader-4-line ri-spin"></i> 搜索中...</div>`;
        tip.style.display = 'none';

        try {
            // 调用后端搜索接口 /api/getBookTitle/:title
            const res = await apiFetch(
                `/api/getBookTitle/${encodeURIComponent(keyword)}`,
                { method: 'GET' }
            );
            const result = await res.json();

            if (result.code === 1000) {
                const books = result.data || [];
                showSearchTip(keyword, books.length);
                renderBooks(books);
            } else {
                alert('搜索失败：' + result.msg);
                grid.innerHTML = `
                    <div class="no-result" style="grid-column:1/-1;">
                        <i class="ri-error-warning-line"></i>
                        <p>搜索出错，请稍后重试</p>
                    </div>`;
            }
        } catch (e) {
            console.error('搜索请求失败:', e);
            alert('网络异常，请稍后重试');
            grid.innerHTML = `
                <div class="no-result" style="grid-column:1/-1;">
                    <i class="ri-wifi-off-line"></i>
                    <p>网络异常，请检查连接</p>
                </div>`;
        }
    }

    // 显示搜索结果提示
    function showSearchTip(keyword, count) {
        const tip = document.getElementById('searchTip');
        tip.innerHTML = `
            <i class="ri-filter-3-line"></i>
            关键词 <span class="tip-keyword">"${escapeHtml(keyword)}"</span>
            共找到 <strong>${count}</strong> 本书
            <span style="margin-left:0.5rem; color:var(--primary); cursor:pointer; font-size:0.85rem;" onclick="clearSearch()">
                <i class="ri-close-circle-line"></i> 清除
            </span>
        `;
        tip.style.display = 'flex';
    }

    // 清除搜索，回到全量列表
    function clearSearch() {
        document.getElementById('searchInput').value = '';
        document.getElementById('btnClear').classList.remove('visible');
        document.getElementById('searchTip').style.display = 'none';
        fetchBooks();
    }

    // ===== 图书列表 =====
    async function fetchBooks() {
        try {
            const res = await apiFetch('/api/getBooksJSON', { method: 'GET' });
            const result = await res.json();
            if (result.code === 1000) {
                // 注意：getBooksJSON 返回的是 Page 结构，数据在 data.data 中
                const books = result.data.data || [];
                renderBooks(books);
            } else {
                alert('获取图书列表失败：' + result.msg);
            }
        } catch (res) {
            console.error(res);
            alert('请求失败，请稍后重试:' + res);
        }
    }

    function renderBooks(books) {
        const grid = document.getElementById('book-grid');
        if (!books || books.length === 0) {
            grid.innerHTML = `
                <div class="no-result" style="grid-column:1/-1;">
                    <i class="ri-search-eye-line"></i>
                    <p>没有找到相关书籍</p>
                </div>`;
            return;
        }
        let html = '';
        books.forEach(book => {
            const priceYuan = (book.price / 100).toFixed(2);
            const score = (book.score / 100).toFixed(2);
            html += `
            <div class="book-card" data-book-id="${book.book_id}">
                <h3>${escapeHtml(book.title)}</h3>
                <p><i class="ri-pencil-line"></i> 作者：${escapeHtml(book.author)}</p>
                <p class="score"><i class="ri-star-smile-line"></i> 评分：${score}</p>
                <p class="price"><i class="ri-money-cny-circle-line"></i> ￥${priceYuan}</p>
                <button
                    class="add-to-cart-btn"
                    data-id="${book.book_id}"
                    data-title="${escapeHtml(book.title)}"
                    data-price="${book.price}"
                    data-stock="${book.stock || 99}"
                >
                    <i class="ri-shopping-cart-line"></i> 加入购物车
                </button>
            </div>
            `;
        });
        grid.innerHTML = html;

        // 重新绑定点击事件（因为 innerHTML 替换后事件丢失）
        grid.onclick = function(e) {
            const button = e.target.closest('.add-to-cart-btn');
            if (button) {
                e.stopPropagation();
                showQuantityDialog(button.dataset.id, button.dataset.title, button.dataset.price, parseInt(button.dataset.stock) || 99);
                return;
            }
            const card = e.target.closest('.book-card');
            if (card && card.dataset.bookId) {
                window.location.href = `/page/BooksPage?book_id=${card.dataset.bookId}`;
            }
        };
    }

    // ===== 排行榜 =====
    async function fetchSalesRanking() {
        const res = await apiFetch('/api/topSale', { method: 'GET' });
        const result = await res.json();
        if (result.code === 1000) return result.data || [];
        throw new Error(result.msg || '获取销量榜失败');
    }

    async function fetchScoreRanking() {
        const res = await apiFetch('/api/topScore', { method: 'GET' });
        const result = await res.json();
        if (result.code === 1000) return result.data || [];
        throw new Error(result.msg || '获取评分榜失败');
    }

    async function fetchRanking(type) {
        const listEl = document.getElementById('ranking-list');
        listEl.innerHTML = '<div class="loading-tip">加载中...</div>';
        try {
            const data = type === 'sales' ? await fetchSalesRanking() : await fetchScoreRanking();
            renderRanking(data, type);
        } catch (res) {
            console.error(res);
            listEl.innerHTML = `<div class="loading-tip">加载失败，请稍后重试</div>`;
        }
    }

    function renderRanking(items, type) {
        const listEl = document.getElementById('ranking-list');
        if (!items || items.length === 0) {
            listEl.innerHTML = '<div class="loading-tip">暂无数据</div>';
            return;
        }
        let html = '';
        items.slice(0, 10).forEach((item, index) => {
            const rank = index + 1;
            const title = escapeHtml(item.title || '');
            let value = type === 'sales'
                ? `<i class="ri-bar-chart-2-line"></i> ${item.sales || 0} 销量`
                : `<i class="ri-star-smile-line"></i> ${(item.score / 100).toFixed(2)} 分`;
            html += `
                <div class="ranking-item" data-book-id="${item.book_id}">
                    <span class="rank-num">${rank}</span>
                    <span class="rank-info"><span class="rank-title">${title}</span></span>
                    <span class="rank-value">${value}</span>
                </div>
            `;
        });
        listEl.innerHTML = html;
    }

    function escapeHtml(unsafe) {
        if (!unsafe) return '';
        return String(unsafe)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }
</script>
</body>
</html>
