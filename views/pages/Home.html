<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>首页 - 网络书城</title>
    <link rel="stylesheet" href="/static/css/CommonStyle.css">
</head>
<body>

<header class="navbar">
    <h1>📚 网络书城</h1>
    <div>
        <a href="/ProfilePage">个人中心</a>
        <button onclick="logout()">退出</button>
    </div>
</header>

<div class="container">
    <h2>图书列表</h2>
    <div class="grid">
        {{ range .books }}
        <div class="book-card">
            <h3>{{ .Title }}</h3>
            <p>作者：{{ .Author }}</p>
            <p class="price">￥{{ .Price }}</p>
            <button onclick="addToCart({{ .ID }})">加入购物车</button>
        </div>
        {{ end }}
    </div>
</div>

<script src="/static/js/CommonScript.js"></script>
</body>
</html>
