basePath: /
definitions:
  models.AddBookParam:
    properties:
      author:
        type: string
      cover_image:
        type: string
      introduction:
        type: string
      price:
        type: integer
      publisher:
        type: string
      stock:
        type: integer
      tags:
        items:
          type: string
        type: array
      title:
        type: string
    required:
    - author
    - price
    - publisher
    - stock
    - title
    type: object
  models.Admin:
    properties:
      admin_id:
        type: integer
      password:
        type: string
      username:
        type: string
    type: object
  models.Book:
    properties:
      author:
        type: string
      book_id:
        type: integer
      cover_image:
        type: string
      introduction:
        type: string
      price:
        description: Price和Score都用int64，前端显示时除以100,避免精度误差
        type: integer
      publisher:
        type: string
      sales:
        type: integer
      score:
        type: integer
      stock:
        type: integer
      tags:
        description: 切片用法
        items:
          $ref: '#/definitions/models.Tag'
        type: array
      title:
        type: string
    type: object
  models.Cart:
    properties:
      book_id:
        type: integer
      cart_id:
        type: integer
      quantity:
        type: integer
      user_id:
        type: integer
    type: object
  models.CartParam:
    properties:
      book_id:
        type: integer
      quantity:
        type: integer
      user_id:
        type: integer
    required:
    - book_id
    type: object
  models.CommentBook:
    properties:
      book_id:
        type: integer
      book_title:
        type: string
      comment:
        type: string
      comment_id:
        type: integer
      comment_time:
        type: string
      like_count:
        type: integer
      parent_id:
        description: 0表示一级评论
        type: integer
      reply_count:
        type: integer
      root_id:
        description: 根评论ID（用于楼中楼）,一级评论的RootID为0，二级评论的RootID为一级评论的CommentID
        type: integer
      status:
        description: 1=正常 2=删除 3=审核中
        type: integer
      user_id:
        type: integer
      username:
        description: 仅用于返回给前端显示，不存储在数据库中
        type: string
    type: object
  models.CommentLikeParam:
    properties:
      comment_id:
        type: integer
    required:
    - comment_id
    type: object
  models.CommentParam:
    properties:
      book_id:
        type: integer
      comment:
        type: string
      parent_id:
        type: integer
      root_id:
        type: integer
    type: object
  models.OrderConfirmParam:
    properties:
      order_id:
        type: integer
    required:
    - order_id
    type: object
  models.OrderItem:
    properties:
      book_id:
        type: integer
      id:
        type: integer
      order_id:
        type: integer
      price:
        description: 下单时价格
        type: integer
      quantity:
        type: integer
      title:
        type: string
    type: object
  models.OrderParam:
    properties:
      book_id:
        type: integer
      quantity:
        type: integer
      user_id:
        type: integer
    type: object
  models.OrderRequest:
    properties:
      items:
        items:
          $ref: '#/definitions/models.OrderParam'
        minItems: 1
        type: array
    required:
    - items
    type: object
  models.OrderView:
    properties:
      created_at:
        type: string
      items:
        items:
          $ref: '#/definitions/models.OrderItem'
        type: array
      order_id:
        type: integer
      status:
        description: -1已删除 0未支付 1已支付待发货 2已发货待收货 3已收货
        type: integer
      total_price:
        type: integer
      user_id:
        type: integer
    type: object
  models.Page:
    properties:
      data: {}
      page:
        type: integer
      total:
        type: integer
    type: object
  models.ParamLogin:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  models.ParamSignUp:
    properties:
      email:
        description: email表示该字段必须是一个合法的邮箱格式
        type: string
      gender:
        enum:
        - 0
        - 1
        type: integer
      password:
        description: binding:"required"表示该字段为必填项
        type: string
      re_Password:
        description: eqfield=Password表示该字段必须和Password字段相等
        type: string
      username:
        description: json表示前端传过来的字段名，binding表示校验规则
        type: string
    required:
    - email
    - password
    - re_Password
    - username
    type: object
  models.ResponseData:
    properties:
      code:
        type: integer
      data: {}
      msg: {}
    type: object
  models.SeckillParam:
    properties:
      book_id:
        type: integer
      end_time:
        type: string
      seckill_price:
        type: integer
      start_time:
        type: string
      stock:
        minimum: 1
        type: integer
    required:
    - book_id
    - end_time
    - seckill_price
    - start_time
    - stock
    type: object
  models.SeckillProductView:
    properties:
      book_id:
        type: integer
      end_time:
        type: string
      id:
        type: integer
      orig_price:
        type: integer
      seckill_price:
        type: integer
      start_time:
        type: string
      status:
        type: integer
      stock:
        type: integer
      title:
        type: string
    type: object
  models.SeckillRequest:
    properties:
      product_id:
        type: integer
    required:
    - product_id
    type: object
  models.Tag:
    properties:
      id:
        type: integer
      name:
        type: string
    type: object
  models.UpdateBookParam:
    properties:
      author:
        type: string
      book_id:
        type: integer
      cover_image:
        type: string
      introduction:
        type: string
      price:
        description: Price和Score都用int64，前端显示时除以100,避免精度误差
        type: integer
      publisher:
        type: string
      stock:
        type: integer
      tags:
        description: 切片用法
        items:
          type: string
        type: array
      title:
        type: string
    type: object
  models.UserRateBook:
    properties:
      Op:
        type: integer
      book_id:
        type: integer
      score:
        type: integer
      user_id:
        type: integer
    type: object
  models.UserRating:
    properties:
      book_id:
        type: integer
      book_title:
        type: string
      score:
        type: integer
      user_id:
        type: integer
    type: object
  models.UserView:
    properties:
      email:
        type: string
      gender:
        type: integer
      user_id:
        type: integer
      username:
        type: string
    type: object
host: localhost:9090
info:
  contact:
    email: frottenice@outlook.com
    name: Me
  description: 一个基于 Gin + GORM + Redis + RabbitMQ 的在线书店后端服务，提供用户认证、书籍管理、购物车、订单及秒杀等功能。
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: Project1_Shop API
  version: "1.0"
paths:
  /admin/book/add:
    post:
      consumes:
      - application/json
      description: 管理员添加新书籍（需要管理员权限）
      parameters:
      - description: 书籍信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.AddBookParam'
      produces:
      - application/json
      responses:
        "200":
          description: 参数错误 / 无权限 / 服务器繁忙
          schema:
            $ref: '#/definitions/models.ResponseData'
      security:
      - BearerAuth: []
      summary: 添加书籍（管理员）
      tags:
      - 书籍管理（管理员）
  /admin/book/delete/{book_id}:
    delete:
      description: 管理员根据书籍 ID 删除书籍（需要管理员权限）
      parameters:
      - description: 书籍 ID
        in: path
        name: book_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 参数错误 / 书籍不存在 / 无权限 / 服务器繁忙
          schema:
            $ref: '#/definitions/models.ResponseData'
      security:
      - BearerAuth: []
      summary: 删除书籍（管理员）
      tags:
      - 书籍管理（管理员）
  /admin/book/update:
    post:
      consumes:
      - application/json
      description: 管理员更新书籍信息，book_id 为必填（需要管理员权限）
      parameters:
      - description: 更新书籍参数
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.UpdateBookParam'
      produces:
      - application/json
      responses:
        "200":
          description: 参数错误 / 书籍不存在 / 无权限 / 服务器繁忙
          schema:
            $ref: '#/definitions/models.ResponseData'
      security:
      - BearerAuth: []
      summary: 更新书籍信息（管理员）
      tags:
      - 书籍管理（管理员）
  /admin/order/list:
    get:
      description: 管理员获取所有待发货订单列表（需要管理员权限）
      produces:
      - application/json
      responses:
        "200":
          description: 无权限 / 服务器繁忙
          schema:
            $ref: '#/definitions/models.ResponseData'
      security:
      - BearerAuth: []
      summary: 获取待发货订单列表（管理员）
      tags:
      - 订单管理（管理员）
  /admin/order/orderShip:
    post:
      consumes:
      - application/json
      description: 管理员对指定订单执行发货操作（需要管理员权限）
      parameters:
      - description: 订单 ID
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.OrderConfirmParam'
      produces:
      - application/json
      responses:
        "200":
          description: 参数错误 / 订单不存在 / 无权限 / 服务器繁忙
          schema:
            $ref: '#/definitions/models.ResponseData'
      security:
      - BearerAuth: []
      summary: 订单发货（管理员）
      tags:
      - 订单管理（管理员）
  /admin/seckill/create:
    post:
      consumes:
      - application/json
      description: 管理员为指定书籍创建秒杀活动，设置秒杀价格、库存和时间（需要管理员权限）
      parameters:
      - description: 秒杀活动参数
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.SeckillParam'
      produces:
      - application/json
      responses:
        "200":
          description: 参数错误 / 无权限 / 服务器繁忙
          schema:
            $ref: '#/definitions/models.ResponseData'
      security:
      - BearerAuth: []
      summary: 创建秒杀活动（管理员）
      tags:
      - 秒杀管理（管理员）
  /admin/seckill/down/{id}:
    post:
      description: 管理员将指定秒杀活动下架（状态置为 0）（需要管理员权限）
      parameters:
      - description: 秒杀活动 ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 参数错误 / 无权限 / 服务器繁忙
          schema:
            $ref: '#/definitions/models.ResponseData'
      security:
      - BearerAuth: []
      summary: 下架秒杀活动（管理员）
      tags:
      - 秒杀管理（管理员）
  /admin/seckill/list:
    get:
      description: 管理员获取所有进行中的秒杀活动列表（需要管理员权限）
      produces:
      - application/json
      responses:
        "200":
          description: 无权限 / 服务器繁忙
          schema:
            $ref: '#/definitions/models.ResponseData'
      security:
      - BearerAuth: []
      summary: 获取秒杀活动列表（管理员）
      tags:
      - 秒杀管理（管理员）
  /api/AdminLogin:
    post:
      consumes:
      - application/json
      description: 管理员登录，成功后通过 Cookie 下发 access_token 和 refresh_token，同时在响应体中返回 access_token
      parameters:
      - description: 管理员登录参数（username、password）
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.Admin'
      produces:
      - application/json
      responses:
        "200":
          description: 参数错误 / 用户名或密码错误 / 服务器繁忙
          schema:
            $ref: '#/definitions/models.ResponseData'
      summary: 管理员登录
      tags:
      - 管理员认证
  /api/AdminRegister:
    post:
      consumes:
      - application/json
      description: 注册新管理员账号，注册成功后自动跳转至管理员登录页面
      parameters:
      - description: 管理员注册参数（username、password）
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.Admin'
      produces:
      - application/json
      responses:
        "200":
          description: 参数错误 / 用户已存在 / 服务器繁忙
          schema:
            $ref: '#/definitions/models.ResponseData'
      summary: 管理员注册
      tags:
      - 管理员认证
  /api/cart:
    delete:
      description: 清空当前登录用户购物车中的所有商品（需要登录）
      produces:
      - application/json
      responses:
        "200":
          description: 未登录 / 服务器繁忙
          schema:
            $ref: '#/definitions/models.ResponseData'
      security:
      - BearerAuth: []
      summary: 清空购物车
      tags:
      - 购物车
    get:
      description: 获取当前登录用户的购物车中所有商品（需要登录）
      produces:
      - application/json
      responses:
        "200":
          description: 未登录 / 服务器繁忙
          schema:
            $ref: '#/definitions/models.ResponseData'
      security:
      - BearerAuth: []
      summary: 获取购物车列表
      tags:
      - 购物车
    post:
      consumes:
      - application/json
      description: 登录用户将书籍加入购物车，若未指定数量则默认为 1（需要登录）
      parameters:
      - description: 购物车参数（book_id 必填，quantity 可选）
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.CartParam'
      produces:
      - application/json
      responses:
        "200":
          description: 参数错误 / 未登录 / 服务器繁忙
          schema:
            $ref: '#/definitions/models.ResponseData'
      security:
      - BearerAuth: []
      summary: 添加书籍到购物车
      tags:
      - 购物车
    put:
      consumes:
      - application/json
      description: 更新当前登录用户购物车中指定书籍的数量（需要登录）
      parameters:
      - description: 更新参数（book_id 和 quantity 必填）
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.CartParam'
      produces:
      - application/json
      responses:
        "200":
          description: 参数错误 / 未登录 / 服务器繁忙
          schema:
            $ref: '#/definitions/models.ResponseData'
      security:
      - BearerAuth: []
      summary: 更新购物车中书籍数量
      tags:
      - 购物车
  /api/cart/{book_id}:
    delete:
      description: 从当前登录用户的购物车中移除指定书籍（需要登录）
      parameters:
      - description: 要删除的书籍 ID
        in: path
        name: book_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 参数错误 / 未登录 / 服务器繁忙
          schema:
            $ref: '#/definitions/models.ResponseData'
      security:
      - BearerAuth: []
      summary: 删除购物车中指定书籍
      tags:
      - 购物车
  /api/comment:
    post:
      consumes:
      - application/json
      description: 登录用户对书籍发表评论，支持嵌套回复（需要登录）
      parameters:
      - description: 评论参数
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.CommentParam'
      produces:
      - application/json
      responses:
        "200":
          description: 参数错误 / 未登录 / 服务器繁忙
          schema:
            $ref: '#/definitions/models.ResponseData'
      security:
      - BearerAuth: []
      summary: 发表书籍评论
      tags:
      - 书籍
  /api/comment/like:
    post:
      consumes:
      - application/json
      description: 登录用户对指定评论进行点赞（需要登录）
      parameters:
      - description: 评论点赞参数
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.CommentLikeParam'
      produces:
      - application/json
      responses:
        "200":
          description: 参数错误 / 服务器繁忙
          schema:
            $ref: '#/definitions/models.ResponseData'
      security:
      - BearerAuth: []
      summary: 点赞评论
      tags:
      - 书籍
  /api/comments:
    get:
      description: 根据书籍 ID 获取该书籍的所有评论（树形结构）
      parameters:
      - description: 书籍 ID
        in: query
        name: book_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 参数错误 / 服务器繁忙
          schema:
            $ref: '#/definitions/models.ResponseData'
      summary: 获取书籍评论列表
      tags:
      - 书籍
  /api/getBookDetail/{book_id}:
    get:
      description: 通过书籍 ID 获取书籍详细信息（管理员和普通用户均可访问）
      parameters:
      - description: 书籍 ID
        in: path
        name: book_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 参数错误 / 书籍不存在 / 服务器繁忙
          schema:
            $ref: '#/definitions/models.ResponseData'
      summary: 根据书籍 ID 获取详情
      tags:
      - 书籍
  /api/getBookTitle/{title}:
    get:
      description: 通过书名关键字模糊搜索书籍列表
      parameters:
      - description: 书名关键字
        in: path
        name: title
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 书籍不存在
          schema:
            $ref: '#/definitions/models.ResponseData'
      summary: 根据书名搜索书籍
      tags:
      - 书籍
  /api/getBooksBySaleJSON:
    get:
      description: 按书籍销量降序返回第 1 页书籍列表
      produces:
      - application/json
      responses:
        "200":
          description: 参数错误
          schema:
            $ref: '#/definitions/models.ResponseData'
      summary: 获取书籍列表（第1页，按销量排序）
      tags:
      - 书籍
  /api/getBooksBySaleJSON/{page}:
    get:
      description: 按书籍销量降序分页返回书籍列表，指定页码（每页 8 条）
      parameters:
      - description: 页码（从 1 开始）
        in: path
        name: page
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 参数错误
          schema:
            $ref: '#/definitions/models.ResponseData'
      summary: 按销量分页获取书籍（指定页码）
      tags:
      - 书籍
  /api/getBooksJSON:
    get:
      description: 按书籍评分降序返回第 1 页书籍列表
      produces:
      - application/json
      responses:
        "200":
          description: 参数错误
          schema:
            $ref: '#/definitions/models.ResponseData'
      summary: 获取书籍列表（第1页，按评分排序）
      tags:
      - 书籍
  /api/getBooksJSON/{page}:
    get:
      description: 按书籍评分降序分页返回书籍列表，指定页码（每页 8 条）
      parameters:
      - description: 页码（从 1 开始）
        in: path
        name: page
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 参数错误
          schema:
            $ref: '#/definitions/models.ResponseData'
      summary: 按评分分页获取书籍（指定页码）
      tags:
      - 书籍
  /api/login:
    post:
      consumes:
      - application/json
      description: 用户登录，成功后通过 Cookie 下发 access_token 和 refresh_token，同时在响应体中返回 access_token
      parameters:
      - description: 登录参数
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.ParamLogin'
      produces:
      - application/json
      responses:
        "200":
          description: 参数错误 / 用户名或密码错误 / 服务器繁忙
          schema:
            $ref: '#/definitions/models.ResponseData'
      summary: 用户登录
      tags:
      - 用户
  /api/orderCancel:
    post:
      consumes:
      - application/json
      description: 用户取消指定未支付订单（需要登录）
      parameters:
      - description: 订单 ID
        in: body
